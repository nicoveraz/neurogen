name: "Phase 1: Baseline Initialization Sweep"
hypothesis: "Establish baseline convergence curves for standard initializations"
model:
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.2
dataset: shakespeare_char
inits:
  - xavier_uniform
  - xavier_normal
  - kaiming_uniform
  - kaiming_normal
  - orthogonal
training:
  max_steps: 5000
  eval_interval: 250
  lr: 3e-4
  batch_size: 64
metrics:
  - train_loss
  - val_loss
  - gradient_norm
seeds: [42, 137, 256]
