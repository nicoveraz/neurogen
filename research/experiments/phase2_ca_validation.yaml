name: "Phase 2: CA Development Validation"
hypothesis: "CA variants produce valid weight tensors with measurable structure"
model:
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.2
dataset: shakespeare_char
inits:
  - grid_ca
  - neural_ca
  - spectral_ca
  - topo_ca
  - reaction_diffusion
training:
  max_steps: 5000
  eval_interval: 250
  lr: 3e-4
  batch_size: 64
metrics:
  - train_loss
  - val_loss
  - weight_spectral_norm
  - weight_effective_rank
seeds: [42, 137, 256]
