name: "Phase 2: CA Development Validation"
hypothesis: "CA variants can produce valid weight tensors with reasonable properties"
model:
  config: default_tiny
dataset: shakespeare_char
inits:
  - grid_ca
  - neural_ca
  - spectral_ca
  - topo_ca
  - reaction_diffusion
training:
  max_steps: 2000
  eval_interval: 250
  eval_steps: 20
  lr: 3.0e-4
  batch_size: 64
  log_interval: 50
metrics:
  - train_loss
  - val_loss
  - gradient_norm
seeds: [42, 137]
