name: "Phase 3: Random CA vs Random Init"
hypothesis: "CA structure alone (with random genome parameters) may provide useful inductive bias even without optimization"
model:
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.2
dataset: shakespeare_char
inits:
  - grid_ca
  - neural_ca
  - xavier_uniform
  - xavier_normal
  - kaiming_normal
training:
  max_steps: 5000
  eval_interval: 250
  lr: 3e-4
  batch_size: 64
metrics:
  - train_loss
  - val_loss
  - weight_spectral_norm
  - weight_effective_rank
  - gradient_norm
seeds: [42, 137, 256]
