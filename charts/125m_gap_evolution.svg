<!-- 25k: 5.5% → y=184, 30k: 7.0% → y=165, 35k: 8.1% → y=150.7, 40k: 9.9% → y=127.3 -->
<!-- 45k: 12.0% → y=100.6, 50k: 12.9% → y=89 -->

<!-- Fill area -->
<path d="M 133,231 L 186,201 L 239,201 L 292,206 L 345,184 L 398,165 L 451,151 L 504,127 L 557,101 L 610,89 L 610,255 L 133,255 Z" fill="#e74c3c" fill-opacity="0.12"/>

<!-- Gap curve -->
<path d="M 133,231 L 186,201 L 239,201 L 292,206 L 345,184 L 398,165 L 451,151 L 504,127 L 557,101 L 610,89" fill="none" stroke="#e74c3c" stroke-width="2.5"/>

