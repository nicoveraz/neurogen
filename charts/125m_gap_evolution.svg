<text x="15" y="165" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90,15,165)">Quartic vs Baseline (%)</text>

<!-- Scale: x = 80 + step/50000*530, y = 255 - gap%/14*180 -->
