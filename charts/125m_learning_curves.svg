<text x="660" y="290" text-anchor="middle" font-size="11" fill="#555">50k</text>
<text x="370" y="318" text-anchor="middle" font-size="13" fill="#555">Training Steps</text>
<text x="18" y="165" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90,18,165)">Validation bpb</text>

<!-- Shaded gap area between curves -->
<path d="M 109,55 L 138,102 L 167,125 L 196,131 L 254,152 L 312,174 L 370,182 L 428,196 L 486,210 L 544,223 L 602,227 L 660,231 L 660,270 L 602,264 L 544,253 L 486,236 L 428,219 L 370,201 L 312,187 L 254,167 L 196,148 L 167,137 L 138,110 L 109,57 Z" fill="#e74c3c" fill-opacity="0.08"/>

