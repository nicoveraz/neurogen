<text x="18" y="172" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90,18,172)">Validation bpb</text>

<!-- Shaded gap area between curves -->
<path d="M 109,55 L 138,98 L 167,119 L 196,125 L 254,144 L 312,164 L 370,172 L 428,185 L 486,198 L 544,210 L 602,214 L 660,217 L 660,254 L 602,248 L 544,238 L 486,222 L 428,207 L 370,190 L 312,177 L 254,159 L 196,140 L 167,130 L 138,105 L 109,56 Z" fill="#e74c3c" fill-opacity="0.1"/>

