name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Lint maintained modules (blocking)
        run: uv run --extra dev ruff check windows.py tests/
      - name: Lint whole repo (informational)
        run: uv run --extra dev ruff check .
        continue-on-error: true
      - name: Run tests
        run: uv run --extra dev pytest -q
