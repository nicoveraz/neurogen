name: Tests

on:
  push:
    branches: [main, neurogen_live_ca]
  pull_request:
    branches: [main, neurogen_live_ca]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check neurogen/ tests/ scripts/

      - name: Format check with black
        run: black --check neurogen/ tests/ scripts/

      - name: Run tests
        run: pytest tests/ -v -m "not slow" --timeout=120
